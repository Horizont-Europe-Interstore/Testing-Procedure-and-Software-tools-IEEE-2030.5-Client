<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Client Runner</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- External Stylesheet -->
    <link rel="stylesheet" href="./static/styles.css">
</head>
<body>

<div class="container">
    <h1>🖥️ C Client Runner</h1>
    <p>Select a command to execute:</p>
    <div class="button-group mb-4">
        <button onclick="runClient()">Run DCAP</button>
    </div>

    <div id="output" class="output">
        <em>Output will appear here...</em>
    </div>
</div>

<!-- Bootstrap JS (optional for more functionality, e.g., modals) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function runClient() {
        const outputEl = document.getElementById('output');
        outputEl.innerHTML = "<em>Running client...</em>";

        fetch('/run-client')
            .then(response => response.text())
            .then(data => {
                const lines = data.trim().split('\n');
                let formatted = '';
                lines.forEach(line => {
                    if (line.includes(':')) {
                        const [key, value] = line.split(/:(.+)/);
                        formatted += `<div><span class="key">${key.trim()}:</span> <span class="value">${value.trim()}</span></div>`;
                    } else if (line.toLowerCase().includes('error') || line.toLowerCase().includes('failed')) {
                        formatted += `<div class="error">${line}</div>`;
                    } else {
                        formatted += `<div>${line}</div>`;
                    }
                });
                outputEl.innerHTML = formatted;
            })
            .catch(err => {
                outputEl.innerHTML = `<div class="error">Error: ${err}</div>`;
            });
    }
</script>

</body>
</html>
